services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/bilibookllm.db
      - LLM_API_BASE_URL=https://api.deepseek.com/v1
      - LLM_MODEL=deepseek-chat
      - WHISPER_MODEL=base
      - CORS_ORIGINS=http://localhost:3000

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - api
